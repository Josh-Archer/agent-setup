name: Reusable Secrets Platform Tests

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secrets-policy-check:
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Validate secret policy and ESO contract suite
        run: |
          DIFF_BASE=HEAD^1 bash scripts/ci/run_contract_test_suite.sh secrets-platform

  render-contract:
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest
      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.4
      - name: Authenticate Helm to GHCR for OCI chart pulls
        shell: bash
        env:
          HELM_REGISTRY_CONFIG: ${{ runner.temp }}/helm-registry/config.json
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${HELM_REGISTRY_CONFIG}")"
          echo "${GHCR_TOKEN}" | helm registry login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      - name: Run secrets-platform render contract
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/test-secrets-platform-render.sh
          scripts/test-secrets-platform-render.sh grok-servaar/infra/secrets-platform/external-chart
      - name: Validate pinned external bridge chart pull
        shell: bash
        env:
          HELM_REGISTRY_CONFIG: ${{ runner.temp }}/helm-registry/config.json
        run: |
          set -euo pipefail
          chart="vaultwarden-eso-bridge"
          repo="$(awk '$1 == "-" && $2 == "name:" {in_chart = ($3 == "vaultwarden-eso-bridge")} in_chart && $1 == "repo:" {print $2; exit}' grok-servaar/infra/secrets-platform/external-chart/kustomization.yaml)"
          version="$(awk '$1 == "-" && $2 == "name:" {in_chart = ($3 == "vaultwarden-eso-bridge")} in_chart && $1 == "version:" {print $2; exit}' grok-servaar/infra/secrets-platform/external-chart/kustomization.yaml)"
          if [ -z "${repo}" ] || [ -z "${version}" ]; then
            echo "ERROR: Failed to parse repo/version from helmCharts block named ${chart}."
            exit 1
          fi
          helm pull "${repo}/${chart}" --version "${version}" --destination /tmp

  eso-integration-real:
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]') }}
    needs: [secrets-policy-check, render-contract]
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    env:
      TEST_REMOTE_REF_KEY: ${{ secrets.VAULTWARDEN_TEST_REMOTE_REF_KEY }}
      TEST_REMOTE_REF_PROPERTY: ${{ secrets.VAULTWARDEN_TEST_REMOTE_REF_PROPERTY }}
      TEST_EXPECTED_VALUE: ${{ secrets.VAULTWARDEN_TEST_EXPECTED_VALUE }}
      TEST_NAMESPACE: eso-vaultwarden-e2e-${{ github.run_id }}
      TEST_BRIDGE_FAILURE_SCENARIO: "false"
      TEST_ES_READY_TIMEOUT: "600s"
      TEST_STORE_READY_TIMEOUT: "240s"
      TEST_BRIDGE_READY_TIMEOUT: "240s"
      TEST_ROTATION_REMOTE_REF_KEY: ${{ secrets.VAULTWARDEN_TEST_ROTATION_REMOTE_REF_KEY }}
      TEST_ROTATION_REMOTE_REF_PROPERTY: ${{ secrets.VAULTWARDEN_TEST_ROTATION_REMOTE_REF_PROPERTY }}
      TEST_ROTATION_EXPECTED_VALUE: ${{ secrets.VAULTWARDEN_TEST_ROTATION_EXPECTED_VALUE }}
    steps:
      - uses: actions/checkout@v6
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest
      - name: Setup Cluster Access
        id: cluster_access
        uses: ./.github/actions/setup-cluster-access
        with:
          tailscale_auth_key: ${{ secrets.GHA_RUNNER_TAILSCALE_AUTH_KEY }}
          kube_ca_cert: ${{ secrets.HOMELAB_CA_CERT }}
          kube_token: ${{ secrets.HOMELAB_SYNC_TOKEN_B64 }}
      - name: Run real integration flow
        if: steps.cluster_access.outputs.configured == 'true'
        run: |
          chmod +x scripts/test-eso-vaultwarden-flow.sh
          scripts/test-eso-vaultwarden-flow.sh
