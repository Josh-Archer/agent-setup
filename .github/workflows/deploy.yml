  # Job 4: Trigger ArgoCD Sync
  argocd-sync:
    needs: [update-manifests, opentofu_homelab, opentofu_vaultwarden]
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || 'ubuntu-latest' }}
    concurrency:
      group: argocd-sync-${{ github.ref }}
      cancel-in-progress: false
    # This job requires reaching the in-cluster ArgoCD API via the LAN-only K8s API endpoint,
    # so it must run on a self-hosted runner with network access.
    if: |
      always() &&
      (needs.update-manifests.result == 'success' || needs.update-manifests.result == 'skipped') &&
      (needs.opentofu_homelab.result == 'success' || needs.opentofu_homelab.result == 'skipped' || needs.opentofu_homelab.result == 'none') &&
      (needs.opentofu_vaultwarden.result == 'success' || needs.opentofu_vaultwarden.result == 'skipped' || needs.opentofu_vaultwarden.result == 'none')
    steps:
      - name: Free Disk Space
        run: |
          echo "ÃƒÂ°Ã…Â¸Ã‚Â§Ã‚Â¹ Cleaning up runner..."
          docker system prune -af --volumes 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'latest'

      - name: Setup Cluster Access
        id: cluster_access
        uses: ./.github/actions/setup-cluster-access
        with:
          tailscale_auth_key: ${{ secrets.GHA_RUNNER_TAILSCALE_AUTH_KEY }}
          kube_ca_cert: ${{ secrets.HOMELAB_CA_CERT }}
          kube_token: ${{ secrets.HOMELAB_SYNC_TOKEN_B64 }}

      - name: Preflight cluster health for ArgoCD sync
        run: |
          set -euo pipefail
          if [ "${{ steps.cluster_access.outputs.configured }}" != "true" ]; then
            echo "No usable kubectl context available for ArgoCD sync."
            exit 1
          fi
          chmod +x scripts/check-cluster-deploy-preflight.sh
          scripts/check-cluster-deploy-preflight.sh
          chmod +x scripts/check-critical-externalsecrets.sh
          CRITICAL_EXTERNAL_SECRETS="${{ vars.SECRETS_PLATFORM_CRITICAL_EXTERNAL_SECRETS }}" \
            scripts/check-critical-externalsecrets.sh

      - name: Trigger ArgoCD Sync
        run: |
          echo "ÃƒÂ°Ã…Â¸Ã…Â¡Ã¢â€šÂ¬ Triggering ArgoCD sync for all OutOfSync applications..."
          
          # Get list of applications that are OutOfSync
          OUT_OF_SYNC_APPS=$(kubectl get applications -n argocd -o jsonpath='{.items[?(@.status.sync.status=="OutOfSync")].metadata.name}')
          
          if [ -n "$OUT_OF_SYNC_APPS" ]; then
            for app in $OUT_OF_SYNC_APPS; do
              echo "Syncing $app..."
              kubectl patch application "$app" -n argocd --type merge -p '{"operation": {"sync": {"prune": true}}}'
            done
          else
            echo "ÃƒÂ¢Ã…â€œÃ¢â‚¬Â¦ All applications are already Synced."
          fi
          
          # Also sync root app to be sure
          echo "Finally, syncing 'root' app..."
          kubectl patch application root -n argocd --type merge -p '{"operation": {"sync": {"prune": true}}}' || true

      - name: Send Notification
        if: success()
        run: |
          MESSAGE="Changes pushed to main. ArgoCD sync triggered."

          if [ -z "${{ secrets.NTFY_TOKEN }}" ]; then
            echo "NTFY_TOKEN not set; skipping deployment notification."
            exit 0
          fi

          curl -sS -X POST "https://ntfy.archer.casa/gha" \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: Deployment Synced" \
            -H "Priority: default" \
            -H "Tags: rocket" \
            -d "${MESSAGE}" >/dev/null

  secrets-platform-smoke:
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || 'ubuntu-latest' }}
    needs: argocd-sync
    concurrency:
      group: secrets-platform-smoke-${{ github.ref }}
      cancel-in-progress: false
    if: |
      always() &&
      needs.argocd-sync.result == 'success'
    env:
      SECRETS_PLATFORM_CRITICAL_EXTERNAL_SECRETS: ${{ vars.SECRETS_PLATFORM_CRITICAL_EXTERNAL_SECRETS != '' && vars.SECRETS_PLATFORM_CRITICAL_EXTERNAL_SECRETS || 'monitoring/grafana-oidc,monitoring/prometheus-mcp-secret,monitoring/unifi-credentials,monitoring/gcp-cloud-logging-sa' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Setup Cluster Access
        id: cluster_access
        uses: ./.github/actions/setup-cluster-access
        with:
          tailscale_auth_key: ${{ secrets.GHA_RUNNER_TAILSCALE_AUTH_KEY }}
          kube_ca_cert: ${{ secrets.HOMELAB_CA_CERT }}
          kube_token: ${{ secrets.HOMELAB_SYNC_TOKEN_B64 }}

      - name: Verify ESO platform core health
        run: |
          set -euo pipefail
          if kubectl auth can-i get deployments.apps -n external-secrets >/dev/null 2>&1; then
            kubectl rollout status deployment/external-secrets -n external-secrets --timeout=180s
            if kubectl get deployment external-secrets-webhook -n external-secrets >/dev/null 2>&1; then
              kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=180s
            fi
            kubectl rollout status deployment/vaultwarden-eso-bridge -n external-secrets --timeout=180s
          else
            echo "Skipping deployment rollout checks (insufficient RBAC for external-secrets namespace)."
          fi

          if kubectl auth can-i get clustersecretstores.external-secrets.io >/dev/null 2>&1; then
            STORE_READY="$(kubectl get clustersecretstore vaultwarden-webhook -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')"
            if [ "$STORE_READY" != "True" ]; then
              echo "ClusterSecretStore vaultwarden-webhook is not Ready"
              kubectl get clustersecretstore vaultwarden-webhook -o yaml
              exit 1
            fi
          else
            echo "Skipping ClusterSecretStore readiness check (insufficient RBAC)."
          fi

      - name: Verify critical ExternalSecrets
        run: |
          set -euo pipefail
          chmod +x scripts/check-critical-externalsecrets.sh
          CRITICAL_EXTERNAL_SECRETS="$SECRETS_PLATFORM_CRITICAL_EXTERNAL_SECRETS" \
            scripts/check-critical-externalsecrets.sh

  ui-health-checks:
    runs-on: ${{ fromJSON(((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && format('["{0}"]', vars.AZURE_VM_RUNNER_LABEL != '' && vars.AZURE_VM_RUNNER_LABEL || 'home-gh-runner')) || '["ubuntu-latest"]') }}
    needs: [secrets-platform-smoke]
    concurrency:
      group: ui-health-checks-${{ github.ref }}
      cancel-in-progress: false
    if: |
      (
        (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true) ||
        (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true)
      ) &&
      (vars.ENABLE_UI_HEALTH_CHECKS == 'true' || vars.ENABLE_UI_HEALTH_CHECKS == true) &&
      always() &&
      (needs.secrets-platform-smoke.result == 'success' || needs.secrets-platform-smoke.result == 'skipped')
    env:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_SKIP_WAIT: "true"
    steps:
      - name: Check ArgoCD credentials
        run: |
          if [ -z "${ARGOCD_AUTH_TOKEN}" ]; then
            echo "Skipping tests/health integration checks: ARGOCD_AUTH_TOKEN not configured."
            echo "SKIP_UI=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.SKIP_UI != 'true'
        uses: actions/checkout@v6

      - name: Set up Node
        if: env.SKIP_UI != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies (Runner)
        if: env.SKIP_UI != 'true'
        run: |
          npm ci --prefer-offline --no-audit

      - name: Run tests/health checks
        if: env.SKIP_UI != 'true'
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_APP_FILTER_REGEX: ${{ secrets.ARGOCD_APP_FILTER_REGEX }}
          ARGOCD_INSECURE: ${{ secrets.ARGOCD_INSECURE }}
          ARGOCD_SKIP_WAIT: "true"
          ZERO_TRUST_HEADERS_JSON: ${{ secrets.ZERO_TRUST_HEADERS_JSON }}
          ZERO_TRUST_COOKIES_JSON: ${{ secrets.ZERO_TRUST_COOKIES_JSON }}
          EXTERNAL_BASE_URL: ${{ secrets.EXTERNAL_BASE_URL }}
          INTERNAL_BASE_URL: ${{ secrets.INTERNAL_BASE_URL }}
          EXTERNAL_HOST_SUFFIX: ${{ secrets.EXTERNAL_HOST_SUFFIX }}
          INTERNAL_HOST_SUFFIX: ${{ secrets.INTERNAL_HOST_SUFFIX }}
          INTERNAL_HOST_MAP_JSON: ${{ secrets.INTERNAL_HOST_MAP_JSON }}
          REQUIRED_APP_HINTS: ${{ secrets.REQUIRED_APP_HINTS }}
          NTFY_TOPIC: gha
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          PLEX_TOKEN: ${{ secrets.PLEX_TOKEN }}
          PLEX_URL: ${{ secrets.PLEX_URL != '' && secrets.PLEX_URL || 'https://plex.archer.casa' }}
          CLEANARR_WEBHOOK_CLIENT_ID: ${{ secrets.CLEANARR_WEBHOOK_CLIENT_ID }}
          CLEANARR_WEBHOOK_CLIENT_SECRET: ${{ secrets.CLEANARR_WEBHOOK_CLIENT_SECRET }}
          HEALTH_RUNNER_PROFILE: ${{ (secrets.INTERNAL_BASE_URL != '' || secrets.INTERNAL_HOST_MAP_JSON != '' || secrets.INTERNAL_HOST_SUFFIX != '') && 'hybrid' || 'external' }}
          # The harness now classifies internal and direct routes itself; keep explicit excludes only for out-of-scope proxies.
          TARGET_HOST_EXCLUDE_REGEX: '(^jarvis-search\.192\.168\.68\.94\.nip\.io$)'
        run: |
          set -euo pipefail
          
          CLEANARR_ZERO_TRUST_HEADERS_JSON=""
          if [ -n "${CLEANARR_WEBHOOK_CLIENT_ID:-}" ] && [ -n "${CLEANARR_WEBHOOK_CLIENT_SECRET:-}" ]; then
            CLEANARR_ZERO_TRUST_HEADERS_JSON=$(CLEANARR_WEBHOOK_CLIENT_ID="$CLEANARR_WEBHOOK_CLIENT_ID" CLEANARR_WEBHOOK_CLIENT_SECRET="$CLEANARR_WEBHOOK_CLIENT_SECRET" python3 -c 'import json, os; print(json.dumps({"CF-Access-Client-Id": os.environ["CLEANARR_WEBHOOK_CLIENT_ID"], "CF-Access-Client-Secret": os.environ["CLEANARR_WEBHOOK_CLIENT_SECRET"]}))')
            export CLEANARR_ZERO_TRUST_HEADERS_JSON
          fi

          echo "Running health checks on the active runner..."
          npm run test:health
