  gcp-worker-plan:
    name: OpenTofu Plan (GCP Worker)
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.gcp_worker == 'true'
    runs-on: ${{ ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && fromJSON('["home-gh-runner"]') || fromJSON(((vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]')) }}
    defaults:
      run:
        working-directory: terraform/gcp-worker
    env:
      TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID != '' && vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      TF_VAR_gcp_node_enabled: ${{ vars.GCP_NODE_ENABLED != '' && vars.GCP_NODE_ENABLED || 'false' }}
      TF_VAR_k3s_token: ${{ secrets.K3S_TOKEN }}
      TF_VAR_k3s_url: ${{ secrets.K3S_URL }}
      TF_VAR_ntfy_token: ${{ secrets.NTFY_TOKEN }}
      TF_VAR_enable_gcp_reconcile_scheduler: ${{ (vars.GCP_RECONCILE_SCHEDULER_ENABLED == 'true' || vars.GCP_RECONCILE_SCHEDULER_ENABLED == true) && 'true' || 'false' }}
      TF_VAR_gcp_reconcile_scheduler_job_name: ${{ vars.GCP_RECONCILE_SCHEDULER_JOB_NAME != '' && vars.GCP_RECONCILE_SCHEDULER_JOB_NAME || 'github-gcp-reconcile-hourly' }}
      TF_VAR_gcp_reconcile_scheduler_schedule: ${{ vars.GCP_RECONCILE_SCHEDULER_SCHEDULE != '' && vars.GCP_RECONCILE_SCHEDULER_SCHEDULE || '0 * * * *' }}
      TF_VAR_gcp_reconcile_scheduler_time_zone: ${{ vars.GCP_RECONCILE_SCHEDULER_TIME_ZONE != '' && vars.GCP_RECONCILE_SCHEDULER_TIME_ZONE || 'Etc/UTC' }}
      TF_VAR_gcp_reconcile_scheduler_paused: ${{ (vars.GCP_RECONCILE_SCHEDULER_PAUSED == 'true' || vars.GCP_RECONCILE_SCHEDULER_PAUSED == true) && 'true' || 'false' }}
      TF_VAR_gcp_reconcile_scheduler_allow_deletions: ${{ (vars.GCP_RECONCILE_SCHEDULER_ALLOW_DELETIONS == 'true' || vars.GCP_RECONCILE_SCHEDULER_ALLOW_DELETIONS == true) && 'true' || 'false' }}
      TF_VAR_github_actions_dispatch_secret_name: ${{ vars.GCP_RECONCILE_DISPATCH_SECRET_NAME != '' && vars.GCP_RECONCILE_DISPATCH_SECRET_NAME || 'github-scheduler-token' }}
      TF_VAR_github_actions_dispatch_secret_version: ${{ vars.GCP_RECONCILE_DISPATCH_SECRET_VERSION != '' && vars.GCP_RECONCILE_DISPATCH_SECRET_VERSION || 'latest' }}
      TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE: ${{ secrets.TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE }}
      TOFU_REPLACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tofu_replace || '' }}

    steps:
      - uses: actions/checkout@v6
      - name: Ensure unzip dependency for OpenTofu action
        if: ${{ runner.os == 'Linux' && startsWith(runner.name, 'az-vm-gha') }}
        run: |
          bash ${{ github.workspace }}/scripts/ci/ensure-opentofu-runner-dependencies.sh

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Create variables file
        run: |
          echo 'allowed_emails = ${{ secrets.TF_VAR_ALLOWED_EMAILS }}' >> secrets.auto.tfvars

      - name: Verify and inject encryption secret
        run: |
          if [ -z "${{ secrets.TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE }}" ]; then
            echo "TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE is missing"
            exit 1
          fi
          sed -i 's/# Passphrase to be provided via TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE/passphrase = "${{ secrets.TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE }}"/g' backend.tf

      - name: OpenTofu init
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TOFU_BACKEND_STATE_KEY: gcp-worker/terraform.tfstate
        run: |
          bash ../../scripts/tofu-init-with-retry.sh --reconfigure

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu plan
        run: |
          set -euo pipefail

          PLAN_FILE="/tmp/tofu-gcp-worker.tfplan"
          PLAN_LOG="/tmp/tofu-gcp-worker-plan.log"
          REPLACE_ARG=""
          if [ -n "${TOFU_REPLACE}" ]; then
            REPLACE_ARG="-replace=${TOFU_REPLACE}"
          fi

          set +e
          if [ -n "${REPLACE_ARG}" ]; then
            tofu plan -input=false -detailed-exitcode -lock-timeout=5m -out="${PLAN_FILE}" "${REPLACE_ARG}" -parallelism=6 2>&1 | tee "${PLAN_LOG}"
          else
            tofu plan -input=false -detailed-exitcode -lock-timeout=5m -out="${PLAN_FILE}" -parallelism=6 2>&1 | tee "${PLAN_LOG}"
          fi
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ]; then
            echo "GCP Worker OpenTofu plan failed with exit ${PLAN_EXIT}."
            exit "${PLAN_EXIT}"
          fi

          echo "GCP Worker OpenTofu plan completed (exit ${PLAN_EXIT})."

