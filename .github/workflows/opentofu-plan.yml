name: OpenTofu Plan Validation

on:
  pull_request:
    paths:
      - 'terraform/ci-runners/**'
      - 'terraform/cloudflare-access/**'
      - 'terraform/homelab/**'
      - 'terraform/identity/**'
      - 'terraform/gcp-worker/**'
      - 'terraform/uptime-kuma-app-engine/**'
      - 'apps/uptime-kuma/**'
      - 'terraform/arr-config/**'
      - 'terraform/unifi/**'
      - 'terraform/aws-backup/**'
      - 'terraform/vaultwarden/**'
      - 'infrastructure/terraform/aws-cleanarr/**'
      - 'infrastructure/terraform/aws-lambda-cleanup/**'
      - 'infrastructure/terraform/azure-lidarr/**'
      - 'terraform/velero-backup/**'
      - 'terraform/velero-rescue-lambda/**'
      - 'scripts/tofu-init-with-retry.sh'
      - 'scripts/tofu-recover-stale-lock.sh'
      - 'scripts/import-cloudflare-state.py'
      - 'scripts/import-gcp-spot-state.sh'
      - 'scripts/cleanup-gcp-orphans.sh'
      - 'scripts/tofu-apply-with-zone-fallback.sh'
      - '.opentofu-version'
      - 'scripts/unifi/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/gcp-control.yml'
      - '.github/workflows/gcp-reconcile.yml'
      - '.github/workflows/opentofu-plan.yml'
  workflow_dispatch:
    inputs:
      tofu_replace:
        description: 'Optional OpenTofu -replace address (advanced)'
        type: string
        required: false
        default: ''
permissions:
  contents: read
  pull-requests: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_VAR_azure_devops_org_url: ${{ vars.AZURE_DEVOPS_ORG_URL }}
  TF_VAR_azure_devops_project: ${{ vars.AZURE_DEVOPS_PROJECT }}
  TF_VAR_azure_devops_pipeline_id: ${{ vars.AZURE_DEVOPS_PIPELINE_ID }}
  TF_VAR_azure_devops_pat: ${{ secrets.AZURE_DEVOPS_PAT }}
  AZDO_ORG_SERVICE_URL: ${{ vars.AZURE_DEVOPS_ORG_URL }}
  AZDO_PERSONAL_ACCESS_TOKEN: ${{ secrets.AZURE_DEVOPS_PAT }}

concurrency:
  group: opentofu-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect OpenTofu changes
    runs-on: ${{ ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && fromJSON('["home-gh-runner"]') || fromJSON(((vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]')) }}
    outputs:
      ci_runners: ${{ steps.detect.outputs.ci_runners }}
      homelab: ${{ steps.detect.outputs.homelab }}
      vaultwarden: ${{ steps.detect.outputs.vaultwarden }}
      gcp_worker: ${{ steps.detect.outputs.gcp_worker }}
      unifi: ${{ steps.detect.outputs.unifi }}
      arr_config: ${{ steps.detect.outputs.arr_config }}
      aws_cleanarr: ${{ steps.detect.outputs.aws_cleanarr }}
      aws_lambda_cleanup: ${{ steps.detect.outputs.aws_lambda_cleanup }}
      azure_lidarr: ${{ steps.detect.outputs.azure_lidarr }}
      velero: ${{ steps.detect.outputs.velero }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD~1 HEAD)"
          else
            changed_files="$(git ls-files)"
          fi

          has_match() {
            local pattern="$1"
            if printf '%s\n' "${changed_files}" | grep -Eq "${pattern}"; then
              echo "true"
            else
              echo "false"
            fi
          }

          echo "ci_runners=$(has_match '^terraform/ci-runners/|^scripts/tofu-init-with-retry\.sh$|^scripts/tofu-recover-stale-lock\.sh$|^\.opentofu-version$|^\.github/workflows/deploy\.yml$|^\.github/workflows/opentofu-plan\.yml$')" >> "$GITHUB_OUTPUT"
          echo "homelab=$(has_match '^terraform/homelab/|^terraform/cloudflare-access/')" >> "$GITHUB_OUTPUT"
          echo "vaultwarden=$(has_match '^terraform/vaultwarden/')" >> "$GITHUB_OUTPUT"
          echo "gcp_worker=$(has_match '^terraform/gcp-worker/')" >> "$GITHUB_OUTPUT"
          echo "unifi=$(has_match '^terraform/unifi/')" >> "$GITHUB_OUTPUT"
          echo "arr_config=$(has_match '^terraform/arr-config/')" >> "$GITHUB_OUTPUT"
          echo "aws_cleanarr=$(has_match '^infrastructure/terraform/aws-cleanarr/')" >> "$GITHUB_OUTPUT"
          echo "aws_lambda_cleanup=$(has_match '^infrastructure/terraform/aws-lambda-cleanup/')" >> "$GITHUB_OUTPUT"
          echo "azure_lidarr=$(has_match '^infrastructure/terraform/azure-lidarr/')" >> "$GITHUB_OUTPUT"
          echo "velero=$(has_match '^terraform/velero-backup/|^terraform/velero-rescue-lambda/')" >> "$GITHUB_OUTPUT"

  ci-runners-plan:
    name: OpenTofu Plan (CI Runners)
    needs: detect-changes
    if: vars.ENABLE_CI_RUNNERS_ROOT == 'true' && vars.CI_RUNNERS_STATE_MIGRATED == 'true' && (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.ci_runners == 'true')
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || 'ubuntu-latest' }}
    concurrency:
      group: tofu-ci-runners-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform/ci-runners
    env:
      TF_VAR_azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || '' }}
      TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || '' }}
      TF_VAR_azure_client_id: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || '' }}
      TF_VAR_azure_client_secret: ${{ secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_CLIENT_SECRET || '' }}
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_ADMIN_TOKEN != '' && secrets.GH_ADMIN_TOKEN || github.token }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_enable_codebuild_runner_project: ${{ vars.ENABLE_CODEBUILD_RUNNER_PROJECT != '' && vars.ENABLE_CODEBUILD_RUNNER_PROJECT || 'false' }}
      TF_VAR_enable_codebuild_runner_repo_variables: 'false'
      TF_VAR_enable_codebuild_runner_toggle_variable: 'false'
      TF_VAR_enable_runner_provider_mode_variable: 'false'
      TF_VAR_enable_self_hosted_runner_toggle_variable: 'false'
      TF_VAR_codebuild_runner_project_name: ${{ vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && vars.AWS_CODEBUILD_RUNNER_PROJECT || 'home-pr-runner' }}
      TF_VAR_codebuild_runner_github_pat: ${{ secrets.GITOPS_PAT != '' && secrets.GITOPS_PAT || secrets.GH_ADMIN_TOKEN }}
      TF_VAR_runner_provider_mode: ${{ vars.RUNNER_PROVIDER_MODE != '' && vars.RUNNER_PROVIDER_MODE || 'github-hosted' }}
      TF_VAR_enable_azure_student_vm: ${{ github.event_name == 'pull_request' && 'false' || vars.ENABLE_AZURE_VM_RUNNERS != '' && vars.ENABLE_AZURE_VM_RUNNERS || 'true' }}
      TF_VAR_azure_student_vm_github_runner_bootstrap_enabled: ${{ github.event_name == 'pull_request' && 'false' || vars.ENABLE_AZURE_VM_RUNNERS != '' && vars.ENABLE_AZURE_VM_RUNNERS || 'true' }}
      TF_VAR_azure_student_vm_github_runner_registration_pat: ${{ github.event_name == 'pull_request' && '' || secrets.GITOPS_PAT != '' && secrets.GITOPS_PAT || secrets.GH_ADMIN_TOKEN }}
      TF_VAR_azure_student_vm_github_runner_count: '2'
      TF_VAR_azure_student_vm_github_runner_labels: '["self-hosted","linux","x64","az-vm-gha"]'
      TF_VAR_azure_vm_runner_label: ${{ vars.AZURE_VM_RUNNER_LABEL != '' && vars.AZURE_VM_RUNNER_LABEL || 'az-vm-gha' }}
      TF_VAR_azure_vm_offload_enabled: ${{ github.event_name == 'pull_request' && 'false' || vars.USE_AZURE_VM != '' && vars.USE_AZURE_VM || 'false' }}
      TF_VAR_azure_student_vm_github_runner_version: '2.333.1'
      TF_VAR_azure_pipelines_mode_enabled: ${{ github.event_name == 'pull_request' && 'false' || vars.USE_AZURE_PIPELINES != '' && vars.USE_AZURE_PIPELINES || 'false' }}
      TF_VAR_azure_pipelines_ready: ${{ github.event_name == 'pull_request' && 'false' || vars.AZURE_PIPELINES_READY != '' && vars.AZURE_PIPELINES_READY || 'false' }}
      TF_VAR_enable_azure_pipelines_toggle_variable: 'false'
      TF_VAR_azure_devops_org_url: ${{ vars.AZURE_DEVOPS_ORG_URL != '' && vars.AZURE_DEVOPS_ORG_URL || '' }}
      TF_VAR_azure_devops_pat: ${{ secrets.AZURE_DEVOPS_PAT != '' && secrets.AZURE_DEVOPS_PAT || '' }}
      TF_VAR_azure_devops_client_id: ${{ vars.AZURE_DEVOPS_CLIENT_ID != '' && vars.AZURE_DEVOPS_CLIENT_ID || vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_DEVOPS_CLIENT_ID != '' && secrets.AZURE_DEVOPS_CLIENT_ID || secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || '' }}
      TF_VAR_azure_devops_client_secret: ${{ secrets.AZURE_DEVOPS_CLIENT_SECRET != '' && secrets.AZURE_DEVOPS_CLIENT_SECRET || secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_CLIENT_SECRET || '' }}
      TF_VAR_azure_devops_tenant_id: ${{ vars.AZURE_DEVOPS_TENANT_ID != '' && vars.AZURE_DEVOPS_TENANT_ID || vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_DEVOPS_TENANT_ID != '' && secrets.AZURE_DEVOPS_TENANT_ID || secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || '' }}
      TF_VAR_azure_pipelines_monthly_minutes_limit: ${{ vars.AZURE_PIPELINES_MONTHLY_MINUTES_LIMIT != '' && vars.AZURE_PIPELINES_MONTHLY_MINUTES_LIMIT || '1800' }}
      TF_VAR_enable_quota_reset_offload: 'false'
      TF_VAR_github_token: ${{ github.event_name == 'pull_request' && '' || secrets.GITOPS_PAT != '' && secrets.GITOPS_PAT || secrets.GH_ADMIN_TOKEN }}
      TF_VAR_ntfy_token: ${{ github.event_name == 'pull_request' && '' || secrets.NTFY_TOKEN }}
      TOFU_REPLACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tofu_replace || '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - name: OpenTofu init
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TOFU_BACKEND_STATE_KEY: ci-runners/terraform.tfstate
        run: |
          bash ../../scripts/tofu-init-with-retry.sh --reconfigure

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu plan
        env:
          TOFU_BACKEND_STATE_KEY: ci-runners/terraform.tfstate
        run: |
          PLAN_LOG="/tmp/tofu-ci-runners-plan.log"
          LOCK_TIMEOUT="15m"
          PLAN_CMD_TIMEOUT="16m"

          run_plan() {
            set +e
            timeout --preserve-status "${PLAN_CMD_TIMEOUT}" \
              tofu plan -input=false -detailed-exitcode -lock-timeout="${LOCK_TIMEOUT}" ${TOFU_REPLACE:+-replace="$TOFU_REPLACE"} 2>&1 | tee "${PLAN_LOG}"
            PLAN_EXIT=${PIPESTATUS[0]}
            set -e
          }

          run_plan

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ] && bash ../../scripts/tofu-recover-stale-lock.sh "${PLAN_LOG}"; then
            echo "Retrying CI Runners plan after stale lock cleanup..."
            run_plan
          fi

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ] && grep -q "Error acquiring the state lock" "${PLAN_LOG}"; then
            echo "State lock is still active; waiting 90s before final retry..."
            sleep 90
            run_plan
          fi

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ]; then
            exit "${PLAN_EXIT}"
          fi

  homelab-plan:
    name: OpenTofu Plan (Cloudflare Access)
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.homelab == 'true'
    runs-on: ${{ ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && fromJSON(format('["{0}"]', vars.AZURE_VM_RUNNER_LABEL != '' && vars.AZURE_VM_RUNNER_LABEL || 'home-gh-runner')) || fromJSON(((vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]')) }}
    concurrency:
      group: tofu-cloudflare-access-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform/homelab
    env:
      TF_VAR_azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || '' }}
      TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || '' }}
      TF_VAR_azure_client_id: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || '' }}
      TF_VAR_azure_client_secret: ${{ secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_CLIENT_SECRET || '' }}
      TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_ADMIN_TOKEN != '' && secrets.GH_ADMIN_TOKEN || github.token }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_tunnel_id: ${{ secrets.TF_VAR_TUNNEL_ID }}
      TF_VAR_keycloak_client_secret: ${{ secrets.TF_VAR_KEYCLOAK_CLIENT_SECRET }}
      TF_VAR_zone_id_archer_casa: ${{ secrets.TF_VAR_ZONE_ID_ARCHER_CASA }}
      TF_VAR_zone_id_archerfamily_io: ${{ secrets.TF_VAR_ZONE_ID_ARCHERFAMILY_IO }}
      TF_VAR_enable_github_actions_secrets_sync: 'false'
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_enable_codebuild_runner_project: ${{ vars.ENABLE_CODEBUILD_RUNNER_PROJECT != '' && vars.ENABLE_CODEBUILD_RUNNER_PROJECT || 'false' }}
      TF_VAR_enable_codebuild_runner_repo_variables: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
      TF_VAR_enable_codebuild_runner_toggle_variable: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
      TF_VAR_enable_runner_provider_mode_variable: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
      TF_VAR_enable_self_hosted_runner_toggle_variable: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
      TF_VAR_codebuild_runner_project_name: ${{ vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && vars.AWS_CODEBUILD_RUNNER_PROJECT || 'home-pr-runner' }}
      TF_VAR_codebuild_runner_github_pat: ${{ secrets.GITOPS_PAT != '' && secrets.GITOPS_PAT || secrets.GH_ADMIN_TOKEN }}
      TF_VAR_runner_provider_mode: ${{ vars.RUNNER_PROVIDER_MODE != '' && vars.RUNNER_PROVIDER_MODE || 'github-hosted' }}
      TF_VAR_enable_azure_student_vm: ${{ github.event_name == 'pull_request' && 'false' || vars.ENABLE_AZURE_VM_RUNNERS != '' && vars.ENABLE_AZURE_VM_RUNNERS || 'true' }}
      TF_VAR_azure_student_vm_github_runner_bootstrap_enabled: ${{ github.event_name == 'pull_request' && 'false' || vars.ENABLE_AZURE_VM_RUNNERS != '' && vars.ENABLE_AZURE_VM_RUNNERS || 'true' }}
      TF_VAR_azure_student_vm_github_runner_registration_pat: ${{ github.event_name == 'pull_request' && '' || secrets.GITOPS_PAT != '' && secrets.GITOPS_PAT || secrets.GH_ADMIN_TOKEN }}
      TF_VAR_azure_student_vm_github_runner_count: '2'
      TF_VAR_azure_student_vm_github_runner_labels: '["self-hosted","linux","x64","az-vm-gha"]'
      TF_VAR_azure_vm_runner_label: 'az-vm-gha'
      TF_VAR_azure_student_vm_github_runner_version: '2.333.1'
      TF_VAR_azure_pipelines_mode_enabled: ${{ github.event_name == 'pull_request' && 'false' || vars.USE_AZURE_PIPELINES != '' && vars.USE_AZURE_PIPELINES || 'false' }}
      TF_VAR_enable_azure_pipelines_toggle_variable: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
      # OpenClaw
      TF_VAR_enable_openclaw_management: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
      TF_VAR_openclaw_url: wss://openclaw.archer.casa
      TF_VAR_openclaw_token: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      TF_VAR_discord_bot_token: ${{ secrets.OPENCLAW_DISCORD_BOT_TOKEN }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_azure_devops_org_url: ${{ vars.AZURE_DEVOPS_ORG_URL != '' && vars.AZURE_DEVOPS_ORG_URL || '' }}
      TF_VAR_azure_devops_project: ${{ vars.AZURE_DEVOPS_PROJECT != '' && vars.AZURE_DEVOPS_PROJECT || '' }}
      TF_VAR_azure_devops_pipeline_id: ${{ vars.AZURE_DEVOPS_PIPELINE_ID != '' && vars.AZURE_DEVOPS_PIPELINE_ID || '' }}
      TF_VAR_azure_pipelines_monthly_minutes_limit: ${{ vars.AZURE_PIPELINES_MONTHLY_MINUTES_LIMIT != '' && vars.AZURE_PIPELINES_MONTHLY_MINUTES_LIMIT || '1800' }}
      TF_VAR_azure_devops_pat: ${{ secrets.AZURE_DEVOPS_PAT != '' && secrets.AZURE_DEVOPS_PAT || '' }}
      TF_VAR_azure_devops_client_id: ${{ vars.AZURE_DEVOPS_CLIENT_ID != '' && vars.AZURE_DEVOPS_CLIENT_ID || vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_DEVOPS_CLIENT_ID != '' && secrets.AZURE_DEVOPS_CLIENT_ID || secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || '' }}
      TF_VAR_azure_devops_client_secret: ${{ secrets.AZURE_DEVOPS_CLIENT_SECRET != '' && secrets.AZURE_DEVOPS_CLIENT_SECRET || secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_CLIENT_SECRET || '' }}
      TF_VAR_azure_devops_tenant_id: ${{ vars.AZURE_DEVOPS_TENANT_ID != '' && vars.AZURE_DEVOPS_TENANT_ID || vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_DEVOPS_TENANT_ID != '' && secrets.AZURE_DEVOPS_TENANT_ID || secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || '' }}
      AZDO_PERSONAL_ACCESS_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.AZURE_DEVOPS_PAT != '' && secrets.AZURE_DEVOPS_PAT || '' }}
      AZDO_ORG_SERVICE_URL: ${{ github.event_name == 'pull_request' && '' || vars.AZURE_DEVOPS_ORG_URL != '' && vars.AZURE_DEVOPS_ORG_URL || '' }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID != '' && vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ secrets.GCP_REGION != '' && secrets.GCP_REGION || vars.GCP_REGION != '' && vars.GCP_REGION || 'us-central1' }}
      TF_VAR_zone: ${{ secrets.GCP_ZONE != '' && secrets.GCP_ZONE || vars.GCP_ZONE != '' && vars.GCP_ZONE || 'us-central1-a' }}
      TF_VAR_k3s_token: ${{ secrets.K3S_TOKEN }}
      TF_VAR_k3s_url: ${{ secrets.K3S_URL }}
      TF_VAR_grafana_auth: ${{ secrets.GRAFANA_ADMIN_PASSWORD != '' && format('admin:{0}', secrets.GRAFANA_ADMIN_PASSWORD) || '' }}
      TOFU_REPLACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tofu_replace || '' }}

    steps:
      - uses: actions/checkout@v6
      - name: Ensure unzip dependency for OpenTofu action
        if: ${{ runner.os == 'Linux' && startsWith(runner.name, 'az-vm-gha') }}
        run: |
          bash ${{ github.workspace }}/scripts/ci/ensure-opentofu-runner-dependencies.sh

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.34.1

      - name: Azure Connectivity Pre-flight
        if: env.TF_VAR_azure_pipelines_mode_enabled == 'true' || env.TF_VAR_runner_provider_mode == 'azure-pipelines'
        shell: bash
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG_URL: ${{ vars.AZURE_DEVOPS_ORG_URL }}
        run: |
          set -euo pipefail
          echo "Verifying Azure DevOps connectivity..."
          if [ -z "${AZURE_DEVOPS_PAT:-}" ]; then
            echo "::error::AZURE_DEVOPS_PAT secret is empty or missing while Azure Pipelines mode is enabled."
            exit 1
          fi

          if [ -z "${AZURE_DEVOPS_ORG_URL:-}" ]; then
            echo "::error::AZURE_DEVOPS_ORG_URL is empty or missing while Azure Pipelines mode is enabled."
            exit 1
          fi

          echo "Azure DevOps inputs are present."
          
          echo "Testing DNS and HTTPS reachability for dev.azure.com..."
          if curl -I -sS --max-time 10 https://dev.azure.com > /dev/null; then
            echo "Successfully reached dev.azure.com"
          else
            echo "Failed to reach dev.azure.com"
          fi

          echo "Testing reachability for login.microsoftonline.com..."
          if curl -I -sS --max-time 10 https://login.microsoftonline.com > /dev/null; then
            echo "Successfully reached login.microsoftonline.com"
          else
            echo "Failed to reach login.microsoftonline.com"
          fi

      - name: Setup Cluster Access for Grafana
        uses: ./.github/actions/setup-cluster-access
        id: grafana_cluster_access
        with:
          tailscale_auth_key: ${{ secrets.GHA_RUNNER_TAILSCALE_AUTH_KEY }}
          kube_ca_cert: ${{ secrets.HOMELAB_CA_CERT }}
          kube_token: ${{ secrets.HOMELAB_SYNC_TOKEN_B64 }}

      - name: Start local Grafana tunnel
        if: steps.grafana_cluster_access.outputs.configured == 'true'
        run: |
          set -euo pipefail
          nohup kubectl -n monitoring port-forward svc/prometheus-grafana 3000:80 >/tmp/grafana-port-forward.log 2>&1 &
          echo $! >/tmp/grafana-port-forward.pid
          sleep 3
          if ! kill -0 "$(cat /tmp/grafana-port-forward.pid)" >/dev/null 2>&1; then
            echo "Grafana port-forward failed to start."
            cat /tmp/grafana-port-forward.log || true
            exit 1
          fi
          echo "TF_VAR_grafana_url=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "Using local Grafana tunnel endpoint for Terraform provider."

      - name: Start local OpenClaw tunnel
        if: steps.grafana_cluster_access.outputs.configured == 'true'
        run: |
          set -euo pipefail
          nohup kubectl -n ai port-forward svc/openclaw 8888:8080 >/tmp/openclaw-port-forward.log 2>&1 &
          echo $! >/tmp/openclaw-port-forward.pid
          sleep 3
          if ! kill -0 "$(cat /tmp/openclaw-port-forward.pid)" >/dev/null 2>&1; then
            echo "OpenClaw port-forward failed to start."
            cat /tmp/openclaw-port-forward.log || true
            echo "::warning::OpenClaw tunnel not available; OpenClaw TF resources may show errors in plan."
          else
            echo "TF_VAR_openclaw_url=ws://127.0.0.1:8888" >> "$GITHUB_ENV"
            echo "Using local OpenClaw tunnel endpoint for Terraform provider."
          fi

      - name: Resolve Grafana auth for plan (best effort)
        if: steps.grafana_cluster_access.outputs.configured == 'true'
        run: |
          set -euo pipefail
          grafana_password="$(kubectl -n monitoring get secret prometheus-grafana -o jsonpath='{.data.admin-password}' 2>/dev/null | base64 -d | tr -d '\r\n' || true)"
          if [ -n "$grafana_password" ]; then
            echo "::add-mask::${grafana_password}"
            echo "::add-mask::admin:${grafana_password}"
            echo "TF_VAR_grafana_auth=admin:${grafana_password}" >> "$GITHUB_ENV"
            echo "Resolved Grafana auth from monitoring/prometheus-grafana secret."
          else
            echo "Could not resolve Grafana password from cluster secret; using existing TF_VAR_grafana_auth."
          fi

      - name: Preflight Grafana connectivity
        run: |
          set -euo pipefail
          check_grafana_health() {
            local url="$1"
            local out_file="$2"
            local code

            code="$(curl -sS -o "$out_file" -w '%{http_code}' -u "$TF_VAR_grafana_auth" "${url%/}/api/health" || true)"
            if [ "$code" != "200" ]; then
              echo "Grafana preflight failed for ${url} (HTTP ${code})."
              cat "$out_file" || true
              return 1
            fi

            if ! grep -q '"database"' "$out_file"; then
              echo "Grafana preflight received unexpected payload from ${url}."
              cat "$out_file" || true
              return 1
            fi

            return 0
          }

          check_grafana_front_door() {
            local url="$1"
            local header_file="$2"
            local code

            code="$(curl -sS -D "$header_file" -o /dev/null -w '%{http_code}' "${url%/}/" || true)"
            case "$code" in
              200|301|302|307|308)
                if grep -qi '^www-authenticate: Cloudflare-Access' "$header_file" || grep -qi '^location: .*cloudflareaccess\.com/' "$header_file"; then
                  echo "Grafana front-door preflight reached protected endpoint ${url} (HTTP ${code})."
                  return 0
                fi
                ;;
            esac

            echo "Grafana front-door preflight failed for ${url} (HTTP ${code})."
            cat "$header_file" || true
            return 1
          }

          wait_for_grafana() {
            local url="$1"
            local attempts=8
            local out_file="/tmp/grafana-health.json"

            for attempt in $(seq 1 "$attempts"); do
              if check_grafana_health "$url" "$out_file"; then
                return 0
              fi

              if [ "$attempt" -lt "$attempts" ]; then
                echo "Retrying Grafana preflight (${attempt}/${attempts}) for ${url}..."
                sleep 3
              fi
            done

            return 1
          }

          wait_for_grafana_front_door() {
            local url="$1"
            local attempts=8
            local header_file="/tmp/grafana-front-door.headers"

            for attempt in $(seq 1 "$attempts"); do
              if check_grafana_front_door "$url" "$header_file"; then
                return 0
              fi

              if [ "$attempt" -lt "$attempts" ]; then
                echo "Retrying Grafana front-door preflight (${attempt}/${attempts}) for ${url}..."
                sleep 3
              fi
            done

            return 1
          }

          GRAFANA_URL="${TF_VAR_grafana_url:-https://metrics.archer.casa}"
          if wait_for_grafana "$GRAFANA_URL"; then
            echo "Grafana preflight passed for ${GRAFANA_URL}."
            exit 0
          fi

          if [ "$GRAFANA_URL" = "http://127.0.0.1:3000" ]; then
            FALLBACK_GRAFANA_URL="https://metrics.archer.casa"
            echo "Local Grafana tunnel preflight failed; trying fallback endpoint ${FALLBACK_GRAFANA_URL}."
            if wait_for_grafana_front_door "$FALLBACK_GRAFANA_URL"; then
              echo "::warning::Grafana API tunnel unavailable; verified the protected public endpoint instead."
              echo "Grafana preflight passed via protected fallback endpoint ${FALLBACK_GRAFANA_URL}."
              exit 0
            fi
          fi

          echo "Grafana preflight failed after retries."
          exit 1

      - name: Create variables file
        run: |
          echo 'allowed_emails = ${{ secrets.TF_VAR_ALLOWED_EMAILS }}' >> secrets.auto.tfvars
          echo 'allowed_email_domains = ${{ secrets.TF_VAR_ALLOWED_EMAIL_DOMAINS }}' >> secrets.auto.tfvars
          echo 'allowed_family_emails = ${{ secrets.TF_VAR_ALLOWED_FAMILY_EMAILS }}' >> secrets.auto.tfvars
          echo 'enable_apex_redirect = true' >> secrets.auto.tfvars
          echo 'keycloak_realm = "homelab"' >> secrets.auto.tfvars
          echo 'enable_unifi_access = true' >> secrets.auto.tfvars
          echo 'unifi_domain = "unifi.archer.casa"' >> secrets.auto.tfvars
          echo 'unifi_origin = "https://home.local:8443"' >> secrets.auto.tfvars
          echo 'ntfy_topic = "gha"' >> secrets.auto.tfvars
          echo 'ntfy_token = "${{ secrets.NTFY_TOKEN }}"' >> secrets.auto.tfvars
          echo 'automation_ui_health = { tailscale_auth_key = "${{ secrets.GHA_RUNNER_TAILSCALE_AUTH_KEY }}" }' >> secrets.auto.tfvars

      - name: Verify and inject encryption secret
        run: |
          if [ -z "${{ secrets.TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE }}" ]; then
            echo "TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE is missing"
            exit 1
          fi
          sed -i 's/# Passphrase to be provided via TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE/passphrase = "${{ secrets.TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE }}"/g' backend.tf

      - name: Disable Azure Terraform for PR validation
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for filename in ("azure-functions-build-dispatch.tf", "azure-student-vm.tf"):
              path = Path(filename)
              if path.exists():
                  path.rename(path.with_suffix(path.suffix + ".pr-disabled"))

          Path("azure-pr-stubs.tf").write_text(
              (
                  "locals {\n"
                  "  azure_functions_build_dispatch_dispatch_url = \"\"\n"
                  "  azure_functions_build_dispatch_health_url   = \"\"\n"
                  "  azure_student_vm_provider_enabled           = var.enable_azure_student_vm\n"
                  "  azure_student_vm_subscription_id            = trimspace(var.azure_subscription_id) != \"\" ? trimspace(var.azure_subscription_id) : \"00000000-0000-0000-0000-000000000000\"\n"
                  "  azure_student_vm_tenant_id                  = trimspace(var.azure_tenant_id) != \"\" ? trimspace(var.azure_tenant_id) : (trimspace(var.azure_devops_tenant_id) != \"\" ? trimspace(var.azure_devops_tenant_id) : \"00000000-0000-0000-0000-000000000000\")\n"
                  "  azure_student_vm_client_id                  = trimspace(var.azure_client_id) != \"\" ? trimspace(var.azure_client_id) : (trimspace(var.azure_devops_client_id) != \"\" ? trimspace(var.azure_devops_client_id) : \"00000000-0000-0000-0000-000000000000\")\n"
                  "  azure_student_vm_client_secret              = trimspace(var.azure_client_secret) != \"\" ? var.azure_client_secret : (trimspace(var.azure_devops_client_secret) != \"\" ? var.azure_devops_client_secret : \"disabled\")\n"
                  "}\n"
                  "\n"
                  "provider \"azurerm\" {\n"
                  "  alias = \"student_vm\"\n"
                  "\n"
                  "  features {}\n"
                  "\n"
                  "  use_cli = false\n"
                  "\n"
                  "  resource_provider_registrations = local.azure_student_vm_provider_enabled ? \"core\" : \"none\"\n"
                  "  subscription_id                 = local.azure_student_vm_subscription_id\n"
                  "  tenant_id                       = local.azure_student_vm_tenant_id\n"
                  "  client_id                       = local.azure_student_vm_client_id\n"
                  "  client_secret                   = local.azure_student_vm_client_secret\n"
                  "}\n"
              ),
              encoding="utf-8",
          )
          PY

      - name: OpenTofu init
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TOFU_BACKEND_STATE_KEY: cloudflare-access/terraform.tfstate
        run: |
          bash ../../scripts/tofu-init-with-retry.sh --reconfigure

      - name: Prune legacy resources from state (non-destructive)
        run: |
          set -euo pipefail
          LEGACY_ADDR_REGEX='^(tailscale_.*|github_actions_secret\.cleanarr_client_(id|secret)\[0\]|cloudflare_zero_trust_access_application\.acme_challenge_bypass\[.*\]|cloudflare_zero_trust_access_application\.calibre|cloudflare_zero_trust_access_policy\.(acme_challenge_bypass|app_launcher_family|admin_.*|family_.*|jellyfin_streaming_bypass|keycloak_bypass|pocket_id_bypass|rancher_bootstrap_bypass|sonarr_api_bypass|github_argocd_bypass|unifi_terraform\[0\]|vaultwarden_.*_bypass))$'

          STATE_LIST="$(tofu state list 2>/dev/null || true)"
          if [ -z "${STATE_LIST}" ]; then
            exit 0
          fi

          LEGACY_ADDRS="$(echo "${STATE_LIST}" | grep -E "${LEGACY_ADDR_REGEX}" || true)"
          if [ -z "${LEGACY_ADDRS}" ]; then
            exit 0
          fi

          while IFS= read -r addr; do
            [ -z "${addr}" ] && continue
            tofu state rm "${addr}" || true
          done <<< "${LEGACY_ADDRS}"

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu plan
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Pre-flight Cloudflare state reconciliation import (best effort)..."
            if ! python3 ../../scripts/import-cloudflare-state.py --terraform-dir .; then
              echo "Pre-flight import reported errors; continuing with plan."
            fi
          else
            echo "Skipping pre-flight import during PR validation."
          fi

          PLAN_FILE="/tmp/tofu-cloudflare.tfplan"
          PLAN_LOG="/tmp/tofu-homelab-plan.log"
          LOCK_TIMEOUT="5m"
          PLAN_CMD_TIMEOUT="16m"

          REPLACE_ARG=""
          if [ -n "${TOFU_REPLACE}" ]; then
            REPLACE_ARG="-replace=${TOFU_REPLACE}"
          fi

          run_plan() {
            set +e
            timeout --preserve-status "${PLAN_CMD_TIMEOUT}" \
              tofu plan -input=false -refresh=false -detailed-exitcode -lock-timeout="${LOCK_TIMEOUT}" -out="${PLAN_FILE}" ${REPLACE_ARG:+"${REPLACE_ARG}"} -parallelism=10 2>&1 | tee "${PLAN_LOG}"
            PLAN_EXIT=${PIPESTATUS[0]}
            set -e
          }

          run_plan
          set -e

          if [ "${PLAN_EXIT}" -eq 124 ]; then
            echo "Cloudflare OpenTofu plan timed out after ${PLAN_CMD_TIMEOUT}."
          fi

          if [ "${PLAN_EXIT}" -ne 0 ] && bash ../../scripts/tofu-recover-stale-lock.sh "${PLAN_LOG}"; then
            echo "Retrying Cloudflare plan after stale lock cleanup..."
            run_plan
          fi

          if [ "${PLAN_EXIT}" -eq 124 ]; then
            echo "Cloudflare OpenTofu plan timed out after ${PLAN_CMD_TIMEOUT}."
          fi

          if [ "${PLAN_EXIT}" -ne 0 ] && grep -q "Error acquiring the state lock" "${PLAN_LOG}"; then
            echo "State lock is still active; waiting 90s before final retry..."
            sleep 90
            run_plan
          fi

          if [ "${PLAN_EXIT}" -eq 124 ]; then
            echo "Cloudflare OpenTofu plan timed out after ${PLAN_CMD_TIMEOUT}."
          fi

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ]; then
            echo "OpenTofu plan failed with exit ${PLAN_EXIT}."
            exit "${PLAN_EXIT}"
          fi

          echo "Cloudflare OpenTofu plan completed (exit ${PLAN_EXIT})."

  identity-plan:
