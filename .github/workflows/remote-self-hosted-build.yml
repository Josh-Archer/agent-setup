name: Remote Self-Hosted Build

on:
  workflow_call:
    inputs:
      source_sha:
        required: false
        type: string
      source_ref:
        required: false
        type: string
      build_image:
        required: true
        type: string
      build_context:
        required: true
        type: string
      build_file:
        required: true
        type: string
      build_tag:
        required: true
        type: string
      build_platforms:
        required: false
        default: linux/amd64
        type: string
      build_push:
        required: false
        default: "true"
        type: string
      runner_labels_json:
        required: false
        default: '["home-gh-runner"]'
        type: string
      cleanup_after_build:
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}
    timeout-minutes: 45
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || inputs.source_ref || github.sha }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.build_file }}
          platforms: ${{ inputs.build_platforms || 'linux/amd64' }}
          push: ${{ inputs.build_push == 'true' }}
          tags: ${{ inputs.build_image }}:${{ inputs.build_tag }}
          cache-from: |
            type=gha
            type=registry,ref=${{ inputs.build_image }}:latest
          cache-to: type=gha,mode=max

      - name: Clean up Docker data
        if: always() && inputs.cleanup_after_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker system prune -af --volumes || true
