name: Deploy Cleanarr AWS Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/aws-cleanarr/**'
      - 'grok-servaar/aws-lambda-cleanup/**'
      - '.github/workflows/deploy-aws-cleanarr.yml'
      - '.opentofu-version'
      - 'scripts/tofu-init-with-retry.sh'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy AWS Infrastructure (OpenTofu)
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'home-gh-runner' || fromJSON(((vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job)) || '["ubuntu-latest"]') }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infrastructure/terraform/aws-cleanarr
    env:
      AWS_DEFAULT_REGION: us-east-1
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      
      # Terraform Static Variables
      TF_VAR_aws_region: "us-east-1"
      TF_VAR_plex_baseurl: "https://plex.archer.casa"
      TF_VAR_plex_token: ${{ secrets.PLEX_TOKEN }}
      TF_VAR_sonarr_baseurl: "https://sonarr.archer.casa/api/v3/"
      TF_VAR_sonarr_apikey: ${{ secrets.SONARR_APIKEY }}
      TF_VAR_radarr_baseurl: "https://radarr.archer.casa/api/v3/"
      TF_VAR_radarr_apikey: ${{ secrets.RADARR_APIKEY }}
      TF_VAR_loki_url: "https://loki.archer.casa/loki/api/v1/push"
      TF_VAR_webhook_secret: ${{ secrets.CLEANARR_WEBHOOK_SECRET }}
      TF_VAR_webhook_secret_previous: ${{ secrets.CLEANARR_WEBHOOK_SECRET_PREVIOUS }}
      TF_VAR_cleanarr_queue_mode: "sqs"
      TF_VAR_cleanarr_queue_fallback_mode: "direct"
      TF_VAR_cleanarr_auto_fallback_enabled: "true"
      TF_VAR_ntfy_base_url: "https://ntfy.archer.casa"
      TF_VAR_ntfy_topic: "media"
      TF_VAR_ntfy_token: ${{ secrets.NTFY_TOKEN }}
      TF_VAR_free_tier_warning_daily_requests: "23333"
      TF_VAR_free_tier_fallback_daily_requests: "26667"
      TF_VAR_sqs_warning_daily_messages: "23333"
      TF_VAR_sqs_fallback_daily_messages: "26667"
      
      # OpenTofu Backend Encryption (Globally available to all steps)
      TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE: ${{ secrets.TF_ENCRYPTION_KEY_PROVIDER_PBKDF2_R2_PASSPHRASE }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gh-cli
        with:
          token: ${{ secrets.GH_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::031332257715:role/github-actions-deploy-role
          aws-region: us-east-1
      - name: Ensure unzip dependency for OpenTofu action
        if: ${{ runner.os == 'Linux' && startsWith(runner.name, 'az-vm-gha') }}
        run: |
          bash ${{ github.workspace }}/scripts/ci/ensure-opentofu-runner-dependencies.sh

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: .opentofu-version

      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS_ACCOUNT_ID=${ACCOUNT_ID}" >> $GITHUB_ENV
          echo "TF_VAR_webhook_image=${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/cleanarr-webhook:latest" >> $GITHUB_ENV
          echo "TF_VAR_job_image=${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/cleanarr-job:latest" >> $GITHUB_ENV

      - name: Fetch Cloudflare Access Tokens
        run: |
          cd ../../../terraform/cloudflare-access

          TOFU_BACKEND_STATE_KEY=cloudflare-access/terraform.tfstate \
          bash ../../scripts/tofu-init-with-retry.sh --reconfigure
          
          echo "TF_VAR_cf_access_client_id=$(tofu output -raw cleanarr_webhook_client_id)" >> "$GITHUB_ENV"
          echo "TF_VAR_cf_access_client_secret=$(tofu output -raw cleanarr_webhook_client_secret)" >> "$GITHUB_ENV"

      - name: OpenTofu Init
        run: |
          TOFU_BACKEND_STATE_KEY=aws-cleanarr/terraform.tfstate \
          bash ../../../scripts/tofu-init-with-retry.sh --reconfigure

      - name: OpenTofu Apply
        run: |
          APPLY_LOG="/tmp/tofu-aws-cleanarr-apply.log"
          set +e
          tofu apply -input=false -auto-approve 2>&1 | tee "${APPLY_LOG}"
          APPLY_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "${APPLY_EXIT}" -ne 0 ] && bash ../../../scripts/tofu-recover-stale-lock.sh "${APPLY_LOG}"; then
            echo "Retrying OpenTofu Apply after stale lock cleanup..."
            set +e
            tofu apply -input=false -auto-approve 2>&1 | tee "${APPLY_LOG}"
            APPLY_EXIT=${PIPESTATUS[0]}
            set -e
          fi

          if [ "${APPLY_EXIT}" -ne 0 ]; then
            exit "${APPLY_EXIT}"
          fi

      - name: Release State Lock on Cancel
        if: cancelled()
        run: |
          echo "Job cancelled. Discovering and releasing state lock..."
          tofu plan -input=false -lock-timeout=1s > /tmp/cancel-lock.log 2>&1 || true
          LOCK_ID=$(sed -n 's/.*ID:[[:space:]]*\(.*\)$/\1/p' /tmp/cancel-lock.log | tail -n 1 | tr -d '\r' | xargs || true)
          if [ -n "$LOCK_ID" ]; then
            echo "Force unlocking $LOCK_ID..."
            tofu force-unlock -force "$LOCK_ID"
          else
            echo "No active lock found."
          fi

      - name: Sync AWS_OIDC_ROLE_ARN Secret
        if: github.ref == 'refs/heads/main'
        run: |
          ROLE_ARN=$(tofu output -raw github_actions_role_arn)
          if [ -n "$ROLE_ARN" ]; then
            echo "Syncing AWS_OIDC_ROLE_ARN to GitHub Secrets..."
            if ! gh secret set AWS_OIDC_ROLE_ARN --body "$ROLE_ARN"; then
              echo "Failed to update AWS_OIDC_ROLE_ARN via GitHub CLI. Ensure GH_TOKEN/GH_ADMIN_TOKEN is configured."
            fi
          else
            echo "github_actions_role_arn output is empty. Skipping sync."
          fi
