name: Postgres Failover — Cluster → Azure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type FAILOVER to confirm'
        required: true
        default: ""

jobs:
  failover:
    name: Cluster → Azure
    runs-on: self-hosted
    if: github.event.inputs.confirm == 'FAILOVER'
    env:
      AZURE_PG_HOST:   homelabdb.postgres.database.azure.com
      CLUSTER_PG_HOST: consolidated-postgres.infra.svc.cluster.local
      CLUSTER_PG_NS:   infra
    steps:
      - name: Checkout (with push credentials)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITOPS_PAT }}
          persist-credentials: true

      - name: Migrate all databases from cluster postgres to Azure
        env:
          AZURE_ADMIN_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          CLUSTER_PG_PASSWORD:  ${{ secrets.CONSOLIDATED_POSTGRES_PASSWORD }}
        run: |
          kubectl run postgres-failover-migrate \
            --rm -i --restart=Never \
            --image=postgres:18-alpine \
            --overrides='{"spec":{"nodeSelector":{"kubernetes.io/hostname":"mac-worker"}}}' \
            --env="AZURE_HOST=${{ env.AZURE_PG_HOST }}" \
            --env="AZURE_ADMIN_PASSWORD=${AZURE_ADMIN_PASSWORD}" \
            --env="CLUSTER_HOST=${{ env.CLUSTER_PG_HOST }}" \
            --env="CLUSTER_PG_PASSWORD=${CLUSTER_PG_PASSWORD}" \
            -- sh -c '
          set -euo pipefail
          export PGSSLMODE=require HOME=/tmp
          DATABASES="
            immich:immich vaultwarden:vaultwarden nextcloud:nextcloud
            paperless:paperless pocket_id:pocket_id grafana:grafana
            keycloak:keycloak jellyseerr:jellyseerr
            sonarr_main:sonarr sonarr_log:sonarr
            radarr_main:radarr radarr_log:radarr
            readarr_hardcover_main:readarr readarr_hardcover_log:readarr
            prowlarr_main:prowlarr prowlarr_log:prowlarr
          "
          for pair in $DATABASES; do
            db="${pair%%:*}"; role="${pair##*:}"
            echo "=== ${db} ==="
            PGSSLMODE=disable PGPASSWORD="${CLUSTER_PG_PASSWORD}" pg_dump \
              -h "${CLUSTER_HOST}" -U postgres --format=custom --no-owner --no-acl \
              "${db}" > "/tmp/${db}.dump"
            PGPASSWORD="${AZURE_ADMIN_PASSWORD}" psql \
              -h "${AZURE_HOST}" -U homelabdbadmin -d postgres \
              -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='"'"'${db}'"'"' AND pid<>pg_backend_pid();" >/dev/null 2>&1 || true
            PGPASSWORD="${AZURE_ADMIN_PASSWORD}" pg_restore \
              -h "${AZURE_HOST}" -U homelabdbadmin -d "${db}" \
              --no-owner --no-acl --no-privileges --clean --if-exists --single-transaction \
              "/tmp/${db}.dump"
            PGPASSWORD="${AZURE_ADMIN_PASSWORD}" psql \
              -h "${AZURE_HOST}" -U homelabdbadmin -d "${db}" \
              -c "REASSIGN OWNED BY homelabdbadmin TO \"${role}\";" >/dev/null 2>&1 || true
            rm -f "/tmp/${db}.dump"
            echo "  ${db} OK"
          done
          '

      - name: Flip postgres service → Azure
        run: |
          python3 scripts/postgres-flip.py cluster-to-azure
          git config user.email "postgres-flip@homelab.local"
          git config user.name  "Postgres Flip Bot"
          git add grok-servaar/infra/postgres-service.yaml
          git add grok-servaar/media/jellyseerr/jellyseerr.yaml
          git add grok-servaar/nextcloud/nextcloud-app-secret-externalsecret.yaml
          git commit -m "infra: failover — postgres service → Azure"
          git push origin main

      - name: Suspend maintenance CronJobs
        run: |
          for job in postgres-backup postgres-restore-test postgres-reconcile-ownership; do
            kubectl patch cronjob "${job}" -n ${{ env.CLUSTER_PG_NS }} \
              --type=merge -p '{"spec":{"suspend":true}}'
          done

      - name: Scale down consolidated-postgres and delete PVCs
        run: |
          kubectl scale deployment consolidated-postgres -n ${{ env.CLUSTER_PG_NS }} --replicas=0
          kubectl wait pod -n ${{ env.CLUSTER_PG_NS }} -l app=consolidated-postgres \
            --for=delete --timeout=60s 2>/dev/null || true
          kubectl delete pvc consolidated-postgres-pvc postgres-backup-pvc \
            -n ${{ env.CLUSTER_PG_NS }} --ignore-not-found=true

      - name: Restart apps that hold DB connections
        run: |
          for ns_dep in "media/immich-server" "media/immich-microservices" "auth/vaultwarden" "auth/pocket-id"; do
            ns="${ns_dep%%/*}"; dep="${ns_dep##*/}"
            kubectl rollout restart deployment "${dep}" -n "${ns}" 2>/dev/null || true
          done
          kubectl rollout restart statefulset keycloak -n auth 2>/dev/null || true

      - name: Done
        run: |
          echo "✅ Azure PostgreSQL is live. Service patched immediately."
          echo "To go back to cluster: run postgres-failback."
