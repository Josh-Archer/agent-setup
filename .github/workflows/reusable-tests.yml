name: Reusable Tests

on:
  workflow_call:
    inputs:
      run_contract_tests:
        description: 'Whether to run contract and policy tests'
        type: boolean
        required: false
        default: false
      prefer_azure_vm_static_checks:
        description: 'Whether ansible-syntax and shellcheck should use the Azure VM runner label when Azure VM mode is enabled'
        type: boolean
        required: false
        default: false
    secrets:
      AZURE_DEVOPS_PAT:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_TENANT_ID:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  opentofu-fmt:
    runs-on: ${{ fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job) || ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && '["home-gh-runner"]') || '["ubuntu-latest"]')) }}
    steps:
      - uses: actions/checkout@v6
      - name: Ensure unzip dependency for OpenTofu action
        if: ${{ runner.os == 'Linux' && startsWith(runner.name, 'az-vm-gha') }}
        run: |
          bash ${{ github.workspace }}/scripts/ci/ensure-opentofu-runner-dependencies.sh

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false
      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive terraform

  unit-tests:
    runs-on: ${{ fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job) || ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && '["home-gh-runner"]') || '["ubuntu-latest"]')) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: .github/workflows/deps/unit-tests-pip.txt

      - name: Install dependencies
        run: |
          pip install -r .github/workflows/deps/unit-tests-pip.txt
          npm ci

      - name: Run Node unit tests
        run: npm test

      - name: Verify Python sources compile
        run: |
          python -m compileall scripts grok-servaar tests hls-downloader terraform/velero-rescue-lambda

      - name: Verify music manager copies stay in sync
        run: |
          python scripts/verify_music_manager_sync.py

      - name: Run Python unit tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py'

  repo-validations:
    runs-on: ${{ fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job) || ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && '["home-gh-runner"]') || '["ubuntu-latest"]')) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: .github/workflows/deps/unit-tests-pip.txt

      - name: Install validation dependencies
        run: |
          pip install -r .github/workflows/deps/unit-tests-pip.txt

      - name: Validate Markdown links
        run: |
          python scripts/validate_markdown_links.py

      - name: Validate embedded Python in manifests
        run: |
          python scripts/validate_embedded_scripts.py --python

      - name: Verify ArgoCD catalog wiring
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python tests/arch-verification/argocd/verify_catalog.py

      - name: Run Flake8
        run: |
          flake8 scripts grok-servaar tests hls-downloader --count --select=E9,F63,F7,F82 --show-source --statistics

  contract-tests:
    if: ${{ inputs.run_contract_tests == true }}
    runs-on: ${{ fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job) || ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && '["home-gh-runner"]') || '["ubuntu-latest"]')) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - name: Run repository contract tests
        run: |
          bash scripts/ci/run_contract_test_suite.sh repo

  ansible-syntax:
    runs-on: ${{ fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job) || ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && '["home-gh-runner"]') || '["ubuntu-latest"]')) }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve ansible-syntax execution path
        id: resolve_ansible_syntax
        shell: bash
        run: |
          if [ "${{ inputs.prefer_azure_vm_static_checks }}" = "true" ] && [ "${{ vars.USE_AZURE_VM }}" = "true" ] && [ "${{ vars.RUNNER_PROVIDER_MODE }}" = "azure-pipelines" ]; then
            echo "command=bash scripts/ci/run_azure_vm_workload.sh ansible-syntax" >> "$GITHUB_OUTPUT"
          else
            echo "command=bash scripts/ci/run_ansible_syntax.sh" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: .github/workflows/deps/ansible-syntax-pip.txt
      - name: Run ansible syntax locally
        run: ${{ steps.resolve_ansible_syntax.outputs.command }}

  shellcheck:
    runs-on: ${{ fromJSON(((vars.RUNNER_PROVIDER_MODE == 'codebuild' || ((vars.RUNNER_PROVIDER_MODE == '' || vars.RUNNER_PROVIDER_MODE == null) && (vars.USE_AWS_CODEBUILD_RUNNERS == 'true' || vars.USE_AWS_CODEBUILD_RUNNERS == true))) && vars.AWS_CODEBUILD_RUNNER_PROJECT != '' && format('["codebuild-{0}-{1}-{2}","job-{3}"]', vars.AWS_CODEBUILD_RUNNER_PROJECT, github.run_id, github.run_attempt, github.job) || ((vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && '["home-gh-runner"]') || '["ubuntu-latest"]')) }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve shellcheck execution path
        id: resolve_shellcheck
        shell: bash
        run: |
          if [ "${{ inputs.prefer_azure_vm_static_checks }}" = "true" ] && [ "${{ vars.USE_AZURE_VM }}" = "true" ] && [ "${{ vars.RUNNER_PROVIDER_MODE }}" = "azure-pipelines" ]; then
            echo "command=bash scripts/ci/run_azure_vm_workload.sh shellcheck" >> "$GITHUB_OUTPUT"
          else
            echo "command=bash scripts/ci/run_shellcheck.sh" >> "$GITHUB_OUTPUT"
          fi
      - name: Run shellcheck locally
        run: ${{ steps.resolve_shellcheck.outputs.command }}
